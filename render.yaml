# Render Blueprint for Scalable Privacy Chat App
# This file deploys both the WebSocket backend and Static frontend

services:
  # WebSocket Backend Service
  - type: web
    name: privacy-chat-backend
    runtime: python
    plan: standard  # Upgrade to Starter or higher for production
    region: singapore  # Closest to India
    buildCommand: pip install -r requirements.txt
    startCommand: python server.py
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: REDIS_URL
        fromService:
          type: redis
          name: chat-redis
          property: connectionString
      - key: DATABASE_URL
        fromDatabase:
          name: chat-postgres
          property: connectionString
    healthCheckPath: /  # Note: WebSocket server doesn't serve HTTP

  # Static Site (Frontend)
  - type: web
    name: privacy-chat-frontend
    runtime: static
    plan: starter
    region: singapore
    buildCommand: echo "No build needed for static HTML"
    staticPublishPath: .
    envVars:
      - key: WS_URL
        fromService:
          type: web
          name: privacy-chat-backend
          property: host
          suffix: |
            wss://{{host}}
    routes:
      - type: rewrite
        source: /
        destination: /index.html

# Redis for shared state
redis:
  - name: chat-redis
    plan: starter
    region: singapore
    maxmemoryPolicy: allkeys-lru

# PostgreSQL for persistent messages
databases:
  - name: chat-postgres
    plan: starter
    region: singapore
    ipAllowList: []  # Allow from anywhere (Render's secure network)
